upstream fleetpro_backend {
    server backend:8000;
}

upstream fleetpro_gps {
    server gps-service:3001;
}

map $http_x_forwarded_proto $fleetpro_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fleetpro_forwarded_proto;

    location /api/ {
        proxy_pass http://fleetpro_backend/api/;
    }

    location /admin/ {
        proxy_pass http://fleetpro_backend/admin/;
    }

    location /static/ {
        proxy_pass http://fleetpro_backend/static/;
    }

    location /socket.io/ {
        proxy_pass http://fleetpro_gps/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        return 200 "ok\n";
    }
}
