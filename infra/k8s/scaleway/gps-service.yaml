apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gps-service
  template:
    metadata:
      labels:
        app: gps-service
    spec:
      imagePullSecrets:
        - name: scaleway-registry
      containers:
        - name: gps-service
          image: fleetpro-gps-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: fleetpro-config
            - secretRef:
                name: fleetpro-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gps-service
spec:
  selector:
    app: gps-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
