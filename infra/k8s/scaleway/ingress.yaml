apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetpro
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.fleetpro.example.com
      secretName: fleetpro-api-tls
  rules:
    - host: api.fleetpro.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8000
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: gps-service
                port:
                  number: 3001
