apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fleetpro
resources:
  - namespace.yaml
  - configmap.yaml
  - core-api.yaml
  - gps-service.yaml
  - ingress.yaml

images:
  - name: fleetpro-backend
    newName: rg.fr-par.scw.cloud/your-namespace/fleetpro-backend
    newTag: latest
  - name: fleetpro-gps-service
    newName: rg.fr-par.scw.cloud/your-namespace/fleetpro-gps-service
    newTag: latest
