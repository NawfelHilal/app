apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetpro-config
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "api.fleetpro.example.com,fleetpro.example.com"
  CORS_ALLOWED_ORIGINS: "https://fleetpro.example.com"
  POSTGRES_DB: "fleetpro"
  POSTGRES_USER: "fleetpro"
  POSTGRES_HOST: "replace-with-scaleway-postgres-endpoint"
  POSTGRES_PORT: "5432"
  GPS_MATCH_RADIUS_KM: "10"
  CORE_API_URL: "http://core-api:8000/api/v1"
  FIREBASE_CREDENTIALS_PATH: ""
  ENABLE_DEMO_SIMULATION: "false"
