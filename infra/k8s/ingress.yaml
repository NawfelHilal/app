apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetpro
  namespace: fleetpro
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: fleetpro.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 8000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: gps-service
                port:
                  number: 3001
