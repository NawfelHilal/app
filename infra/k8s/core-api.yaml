apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: fleetpro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: fleetpro/core-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: fleetpro-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: fleetpro
spec:
  selector:
    app: core-api
  ports:
    - port: 8000
      targetPort: 8000

