services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fleetpro}
      POSTGRES_USER: ${POSTGRES_USER:-fleetpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetpro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetpro} -d ${POSTGRES_DB:-fleetpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --access-logfile - --error-logfile -"

  gps-service:
    build:
      context: ./gps-service
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "3001:3001"
    volumes:
      - ./gps-service:/app
      - /app/node_modules

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - gps-service
    ports:
      - "8090:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
