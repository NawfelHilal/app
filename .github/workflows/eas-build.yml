name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Plateforme à builder"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "Profil EAS"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production
      wait:
        description: "Attendre la fin du build EAS"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "mobile-v*"

jobs:
  eas-build:
    name: Build mobile with EAS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      EAS_PLATFORM: ${{ github.event.inputs.platform || 'android' }}
      EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}
      EAS_WAIT_FLAG: ${{ github.event.inputs.wait == 'true' && '--wait' || '--no-wait' }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_GPS_URL: ${{ vars.EXPO_PUBLIC_GPS_URL }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_USE_SIMULATED_PAYMENT: ${{ vars.EXPO_PUBLIC_USE_SIMULATED_PAYMENT || 'false' }}
      EXPO_PUBLIC_ENABLE_DEMO_SIMULATION: ${{ vars.EXPO_PUBLIC_ENABLE_DEMO_SIMULATION || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is missing. Create it in GitHub Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

      - run: npm ci

      - run: npm run typecheck

      - name: Start EAS build
        run: eas build --platform "$EAS_PLATFORM" --profile "$EAS_PROFILE" --non-interactive "$EAS_WAIT_FLAG"
