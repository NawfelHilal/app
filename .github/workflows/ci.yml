name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fleetpro
          POSTGRES_USER: fleetpro
          POSTGRES_PASSWORD: fleetpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetpro -d fleetpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: ruff check .
        working-directory: backend
      - run: bandit -r apps -x "*/migrations/*" --severity-level medium
        working-directory: backend
      - run: pip-audit -r requirements.txt --strict
        working-directory: backend
      - run: coverage run manage.py test tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ci
          JWT_SIGNING_KEY: fleetpro-ci-jwt-signing-key-at-least-32-characters
          POSTGRES_DB: fleetpro
          POSTGRES_USER: fleetpro
          POSTGRES_PASSWORD: fleetpro
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
      - run: coverage report --fail-under=90
        working-directory: backend
      - run: coverage xml
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error
      - run: python manage.py makemigrations --check --dry-run
        working-directory: backend

  gps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: gps-service
      - run: npm run security:audit
        working-directory: gps-service
      - run: npm run lint
        working-directory: gps-service
      - run: npm run test:coverage
        working-directory: gps-service
      - uses: actions/upload-artifact@v4
        with:
          name: gps-coverage
          path: gps-service/src/coverage/lcov.info
          if-no-files-found: error
      - run: npm run typecheck
        working-directory: gps-service
      - run: npm run build
        working-directory: gps-service

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: mobile
      - run: npm run security:audit
        working-directory: mobile
      - run: npm run lint
        working-directory: mobile
      - run: npm run test:coverage
        working-directory: mobile
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          if-no-files-found: error
      - run: npm run typecheck
        working-directory: mobile

  sonarqube:
    runs-on: ubuntu-latest
    needs:
      - backend
      - gps
      - mobile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - uses: actions/download-artifact@v4
        with:
          name: gps-coverage
          path: gps-service/src/coverage

      - uses: actions/download-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage

      - name: Check SonarQube configuration
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing. Add it in GitHub Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "SONAR_HOST_URL is missing. Add it in GitHub Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          test -f backend/coverage.xml
          test -f gps-service/src/coverage/lcov.info
          test -f mobile/coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Install GPS dependencies for SonarQube
        run: npm ci
        working-directory: gps-service

      - name: Install mobile dependencies for SonarQube
        run: npm ci
        working-directory: mobile

      - name: SonarQube Community Build scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Show SonarQube Quality Gate details
        if: failure()
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.request

          host = os.environ["SONAR_HOST_URL"].rstrip("/")
          token = os.environ["SONAR_TOKEN"]
          url = f"{host}/api/qualitygates/project_status?projectKey=fleetpro"
          request = urllib.request.Request(url)
          basic = base64.b64encode(f"{token}:".encode()).decode()
          request.add_header("Authorization", f"Basic {basic}")

          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)

          status = payload.get("projectStatus", {})
          print(f"Quality Gate: {status.get('status')}")
          for condition in status.get("conditions", []):
              metric = condition.get("metricKey")
              actual = condition.get("actualValue")
              comparator = condition.get("comparator")
              threshold = condition.get("errorThreshold")
              result = condition.get("status")
              print(f"- {metric}: {actual} {comparator} {threshold} => {result}")

          if status.get("status") == "ERROR":
              sys.exit(1)
          PY
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
