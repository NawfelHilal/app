name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fleetpro
          POSTGRES_USER: fleetpro
          POSTGRES_PASSWORD: fleetpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleetpro -d fleetpro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: python manage.py test tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ci
          JWT_SIGNING_KEY: fleetpro-ci-jwt-signing-key-at-least-32-characters
          POSTGRES_DB: fleetpro
          POSTGRES_USER: fleetpro
          POSTGRES_PASSWORD: fleetpro
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
      - run: python manage.py makemigrations --check --dry-run
        working-directory: backend

  gps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: gps-service
      - run: npm run test
        working-directory: gps-service
      - run: npm run typecheck
        working-directory: gps-service
      - run: npm run build
        working-directory: gps-service

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: mobile
      - run: npm run typecheck
        working-directory: mobile
