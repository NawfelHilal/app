sonar.projectKey=fleetpro
sonar.projectName=FleetPro
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

sonar.sources=backend/apps,gps-service/src,mobile/src
sonar.tests=backend/tests,gps-service/src,mobile/src
sonar.test.inclusions=backend/tests/**/*.py,gps-service/src/**/*.spec.ts,mobile/src/**/*.test.ts
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/node_modules/**,**/coverage/**,**/dist/**,**/build/**,gps-service/src/**/*.spec.ts,mobile/src/**/*.test.ts
sonar.coverage.exclusions=backend/tests/**,**/migrations/**,gps-service/src/**/*.spec.ts,mobile/src/**/*.test.ts

sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=gps-service/src/coverage/lcov.info,mobile/coverage/lcov.info

sonar.qualitygate.wait=true
